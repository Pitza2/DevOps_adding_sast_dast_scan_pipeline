name: OWASP ZAP DAST scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  zap:
    name: zap/automation-scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and start Flask app
        run: |
          docker build -t vuln-flask-app ./app
          # Changed from '-p 5000:5000' to '--network=host' to fix the timeout/hang
          docker run -d --name flask-app --network=host vuln-flask-app

      - name: Wait for app to be ready
        run: |
          for i in {1..10}; do
            curl -s http://localhost:5000 && break
            sleep 3
          done

      - name: ZAP Automation Framework Scan
        # Switched to the modern action designed for your YAML file
        uses: zaproxy/action-af@v0.3.0
        with:
          plan: ".github/zap.yml"

      - name: Print ZAP Summary to Logs & Pipeline Dashboard
        if: always() # Ensures logs & reports publish even if the scan failed/blocked the run
        run: |
          if [ -f zap-summary.md ]; then
            # This renders the report beautifully right on your GitHub summary page
            cat zap-summary.md >> $GITHUB_STEP_SUMMARY
            # This dumps the text directly into the console logs
            cat zap-summary.md
          else
            echo "ZAP summary file not found."
          fi