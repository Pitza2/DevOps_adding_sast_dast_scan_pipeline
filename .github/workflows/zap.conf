env:
  contexts:
    - name: "flask-app"
      urls:
        - "http://localhost:5000"
      authentication:
        method: "form"
        parameters:
          loginPageUrl: "http://localhost:5000/"
          loginRequestData: "username=admin&password=password123"
          loginPagePostUrl: "http://localhost:5000/"
        verification:
          method: "response"
          loggedInRegex: "Welcome"
          loggedOutRegex: "Login"
      sessionManagement:
        method: "cookie"
      users:
        - name: "admin"
          credentials:
            username: "admin"
            password: "password123"

jobs:
  - type: spider
    parameters:
      context: "flask-app"
      user: "admin"
      maxDuration: 2

  - type: activeScan
    parameters:
      context: "flask-app"
      user: "admin"
      policy: "Default Policy"

  - type: report
    parameters:
      template: "traditional-html"
      reportDir: "/zap/wrk"
      reportFile: "zap-report"