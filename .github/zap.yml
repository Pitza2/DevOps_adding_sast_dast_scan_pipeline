env:
  parameters:
    failOnError: false
    failOnWarning: false
  contexts:
    - name: "flask-app"
      urls:
        - "http://localhost:5000"
      authentication:
        method: "form"
        parameters:
          loginPageUrl: "http://localhost:5000/"
          loginRequestUrl: "http://localhost:5000/"  # Fixed: Tells ZAP exactly where to POST login details
          loginRequestBody: "username={%username%}&password={%password%}" # Fixed: Uses proper injection tokens
        verification:
          method: "response"
          loggedInRegex: "Welcome"
          loggedOutRegex: "Login"
      sessionManagement:
        method: "cookie"
      users:
        - name: "admin"
          credentials:
            username: "admin"
            password: "password123"

jobs:
  - type: spider
    parameters:
      context: "flask-app"
      user: "admin"
      maxDuration: 2

  - type: passiveScan-config
    parameters:
      maxAlertsPerRule: 10

  - type: activeScan
    parameters:
      context: "flask-app"
      user: "admin"

  - type: report
    parameters:
      template: "traditional-html"
      reportDir: "/zap/wrk"
      reportFile: "zap-report"

  - type: report
    parameters:
      template: "traditional-md"
      reportDir: "/zap/wrk"
      reportFile: "zap-summary"

  - type: exitStatus
    parameters:
      errorLevel: "High" # Options: Informational, Low, Medium, High
      errorExitValue: 1